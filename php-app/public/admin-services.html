<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serviços especializados - Admin</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="page" data-page="services">
  <header class="topbar">
    <div class="brand">Admin · Serviços</div>
    <nav>
      <a href="/admin.html">Dashboard</a>
      <a href="/admin-orders.html">Encomendas</a>
      <a href="/admin-users.html">Utilizadores</a>
      <a href="/admin-metrics.html">Métricas</a>
      <a href="/admin-audits.html">Auditoria</a>
      <button id="logout" class="ghost">Terminar sessão</button>
    </nav>
  </header>
  <main class="content">
    <section class="card">
      <h1>Pedidos de serviços especializados</h1>
      <p class="muted">Inclui revisão linguística, estatística, apresentações, CV, plágio, resumos e pedidos de Ensino à Distância VIP.</p>
      <div id="admin-feedback" class="toast"></div>
      <div class="inline-group services-filter-bar" style="margin:0.75rem 0 1rem;flex-wrap:wrap;">
        <button type="button" class="ghost" data-service-filter="all">Todos</button>
        <button type="button" class="ghost" data-service-filter="vip">Ensino à Distância</button>
        <button type="button" class="ghost" data-service-filter="others">Outros serviços</button>
      </div>
      <div id="admin-services" class="grid"></div>
    </section>
  </main>
  <div id="confirm-dialog" class="modal hidden">
    <div class="modal-content">
      <p id="confirm-text"></p>
      <div class="inline-group">
        <button id="confirm-cancel" class="ghost">Cancelar</button>
        <button id="confirm-accept" class="primary">Confirmar</button>
      </div>
    </div>
  </div>
  <footer class="footer"><p class="muted">© 2024 Fluxosoftwares</p></footer>
  <script src="/admin.js"></script>
  <script src="/nav-mobile.js"></script>
</body>
</html>
